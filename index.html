<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Career Hub Pro Mobile</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #2563eb; --primary-dark: #1d4ed8;
            --bg: #f1f5f9; --card: #ffffff;
            --text: #0f172a; --border: #e2e8f0;
            --accent: #f59e0b; --success: #059669; --danger: #ef4444;
        }

        body { 
            font-family: 'Inter', system-ui, -apple-system, sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; 
            padding: 0; 
            -webkit-tap-highlight-color: transparent;
        }
        
        /* Navigazione ottimizzata per iPhone (Scorrimento orizzontale) */
        nav { 
            background: var(--card); 
            border-bottom: 1px solid var(--border); 
            position: sticky; 
            top: 0; 
            z-index: 100; 
            padding: 10px 0;
        }
        .nav-brand { 
            text-align: center; 
            font-weight: 800; 
            font-size: 1.1rem; 
            color: var(--primary); 
            margin-bottom: 10px;
        }
        .nav-links { 
            display: flex; 
            overflow-x: auto; 
            white-space: nowrap; 
            padding: 0 10px;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }
        .nav-links::-webkit-scrollbar { display: none; }
        .nav-links button { 
            background: #f8fafc; 
            border: 1px solid var(--border); 
            color: #64748b; 
            font-weight: 600; 
            margin-right: 8px; 
            padding: 8px 15px; 
            border-radius: 20px;
            font-size: 0.85rem;
            flex: 0 0 auto;
        }
        .nav-links button.active { 
            background: var(--primary); 
            color: white; 
            border-color: var(--primary); 
        }

        .container { padding: 15px; margin-bottom: 50px; }
        
        .view { display: none; }
        .view.active { display: block; }

        /* Stats Grid: 2 colonne su mobile */
        .stats-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 10px; 
            margin-bottom: 20px; 
        }
        .stat-card { 
            background: var(--card); 
            padding: 1rem; 
            border-radius: 12px; 
            border: 1px solid var(--border); 
            box-shadow: 0 1px 2px rgba(0,0,0,0.05); 
        }
        .stat-card span { font-size: 0.65rem; color: #64748b; font-weight: 700; text-transform: uppercase; }
        .stat-card h2 { margin: 5px 0 0; color: var(--primary); font-size: 1.3rem; }

        /* Form ottimizzato per iPhone */
        .form-card { 
            background: var(--card); 
            padding: 15px; 
            border-radius: 16px; 
            border: 1px solid var(--border); 
            margin-bottom: 15px; 
        }
        .form-grid { display: flex; flex-direction: column; gap: 12px; }
        
        label { display: block; margin-bottom: 4px; font-weight: 600; font-size: 0.8rem; color: #475569; }
        input, select, textarea { 
            width: 100%; 
            height: 44px; /* Altezza ottimale touch */
            padding: 10px; 
            border: 1px solid var(--border); 
            border-radius: 10px; 
            font-size: 16px; /* Evita zoom automatico iOS */
            box-sizing: border-box; 
        }
        textarea { height: 100px; }
        
        .link-container { display: flex; gap: 5px; }

        .btn { 
            height: 44px;
            padding: 0 15px; 
            border-radius: 10px; 
            font-weight: 700; 
            border: none; 
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn-primary { background: var(--primary); color: white; width: 100%; }
        .btn-success { background: var(--success); color: white; width: 100%; }
        .btn-outline { background: white; border: 1px solid var(--border); color: #64748b; }
        .btn-small { height: 32px; font-size: 0.75rem; padding: 0 10px; }

        /* Tabelle scrollabili su mobile */
        .table-container { 
            background: var(--card); 
            border-radius: 12px; 
            border: 1px solid var(--border); 
            overflow-x: auto; 
            -webkit-overflow-scrolling: touch;
        }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th { background: #f8fafc; padding: 10px; text-align: left; font-size: 0.65rem; color: #64748b; }
        td { padding: 10px; border-bottom: 1px solid var(--border); font-size: 0.8rem; }

        .urgent-item { 
            padding: 12px; 
            background: #fff; 
            border-radius: 10px; 
            border: 1px solid var(--border); 
            margin-bottom: 10px; 
            border-left: 4px solid var(--primary); 
        }
        .rating-star { color: var(--accent); letter-spacing: -2px; }
        
        #impactChartContainer { height: 250px; }

    </style>
</head>
<body>

<nav class="no-print">
    <div class="nav-brand">🎯 CareerOS Mobile</div>
    <div class="nav-links">
        <button onclick="showView('dashboard')" id="btn-dashboard" class="active">Dash</button>
        <button onclick="showView('address-book')" id="btn-address-book">Rubrica</button>
        <button onclick="showView('new-action')" id="btn-new-action">+ Nuova</button>
        <button onclick="showView('registry')" id="btn-registry">Registro</button>
        <button onclick="showView('archive')" id="btn-archive">Archivio</button>
        <button onclick="showView('settings')" id="btn-settings">Config</button>
    </div>
</nav>

<div class="container">
    
    <section id="view-dashboard" class="view active">
        <div class="stats-grid">
            <div class="stat-card" onclick="filterByStatus('In Corso')"><span>In Corso</span><h2 id="stat-in-progress">0</h2></div>
            <div class="stat-card" onclick="filterByStatus('Colloquio')"><span>Colloqui</span><h2 id="stat-interviews">0</h2></div>
            <div class="stat-card"><span>Tot. Fatti</span><h2 id="stat-interviews-total">0</h2></div>
            <div class="stat-card" style="border-left: 3px solid var(--danger);"><span>Rigettate</span><h2 id="stat-rejected">0</h2></div>
        </div>

        <div class="form-card">
            <h3 style="margin:0 0 10px 0; font-size: 1rem;">📅 Scadenze</h3>
            <div id="urgent-list"></div>
        </div>

        <div class="form-card">
            <h3 style="margin:0 0 10px 0; font-size: 1rem;">📊 Trend</h3>
            <div id="impactChartContainer"><canvas id="impactChart"></canvas></div>
        </div>
    </section>

    <section id="view-settings" class="view">
        <div class="form-card">
            <h3>📤 Backup</h3>
            <div class="form-grid">
                <select id="export-type" onchange="toggleExportDates(this.value)">
                    <option value="total">Totale</option>
                    <option value="range">Per data</option>
                </select>
                <div class="export-date-field" style="display:none">
                    <input type="date" id="export-start">
                    <input type="date" id="export-end" style="margin-top:10px">
                </div>
                <button class="btn btn-primary" onclick="exportData('json')">Backup JSON</button>
                <button class="btn btn-success" onclick="exportData('xlsx')">Excel</button>
            </div>
            <div style="margin-top:20px; border-top:1px solid #eee; padding-top:15px;">
                <label>Importa JSON</label>
                <input type="file" id="import-file" accept=".json" style="padding:5px; height:auto">
                <button class="btn btn-outline" style="margin-top:10px; color:var(--danger)" onclick="importDatabase()">Sovrascrivi dati</button>
            </div>
        </div>
    </section>

    <section id="view-address-book" class="view">
        <div class="form-card">
            <h3 id="crm-form-title">🏢 Azienda</h3>
            <input type="hidden" id="c-id">
            <div class="form-grid">
                <input type="text" id="c-name" placeholder="Nome Azienda *">
                <input type="text" id="c-person" placeholder="Referente">
                <input type="text" id="c-email" placeholder="Email">
                <textarea id="c-notes" placeholder="Note..."></textarea>
                <div style="display: flex; gap: 10px;">
                    <button class="btn btn-success" onclick="addContact()">Salva</button>
                    <button class="btn btn-outline" onclick="resetCRMForm()">X</button>
                </div>
            </div>
        </div>
        <input type="text" id="crm-search" placeholder="🔍 Cerca..." onkeyup="renderContacts()" style="margin-bottom:10px">
        <div class="table-container"><table><thead><tr><th>Azienda</th><th>Referente</th><th>Azioni</th></tr></thead><tbody id="contact-list"></tbody></table></div>
    </section>

    <section id="view-new-action" class="view">
        <div class="form-card">
            <h2 id="action-form-title" style="font-size:1.2rem">🚀 Candidatura</h2>
            <input type="hidden" id="act-id">
            <div class="form-grid">
                <label>Azienda</label><select id="act-company" onchange="updateReferentList()"></select>
                <label>Referente</label><select id="act-referent"></select>
                <label>Ruolo</label><input type="text" id="act-role">
                <label>Importanza</label><select id="act-rating"><option value="1">⭐</option><option value="2">⭐⭐</option><option value="3" selected>⭐⭐⭐</option><option value="4">⭐⭐⭐⭐</option><option value="5">⭐⭐⭐⭐⭐</option></select>
                <label>Data</label><input type="date" id="act-date">
                <label>Stato</label><select id="act-status-select"></select>
                
                <label>Link Annuncio</label>
                <div class="link-container">
                    <input type="url" id="act-link" placeholder="https://...">
                    <button class="btn btn-outline btn-small" onclick="openOuterLink('act-link')">🌐</button>
                </div>

                <div style="background:#fefce8; padding:10px; border-radius:12px; margin-top:10px;">
                    <h4 style="margin:0 0 10px 0">📅 Prossimo Follow-up</h4>
                    <input type="date" id="new-fu-date" style="margin-bottom:8px">
                    <input type="text" id="new-fu-desc" placeholder="Cosa fare?">
                    <button class="btn btn-outline btn-small" style="width:100%; margin-top:8px" onclick="addFUToTemp()">+ Aggiungi Task</button>
                    <div class="table-container" style="margin-top:10px; background:white">
                        <table style="min-width:100%">
                            <tbody id="fu-history-list"></tbody>
                        </table>
                    </div>
                </div>

                <label>Note Generali</label>
                <textarea id="act-notes"></textarea>
            </div>
            <div style="margin-top:20px; display:flex; flex-direction:column; gap:10px;">
                <button class="btn btn-primary" onclick="saveAction()">SALVA TUTTO</button>
                <button class="btn btn-outline" onclick="showView('registry')">Annulla</button>
            </div>
        </div>
    </section>

    <section id="view-registry" class="view">
        <input type="text" id="registry-search" placeholder="🔍 Ricerca..." onkeyup="renderRegistry()" style="margin-bottom:10px">
        <div class="table-container"><table><thead><tr><th>Azienda</th><th>Ruolo</th><th>Stato</th><th>Azioni</th></tr></thead><tbody id="action-list"></tbody></table></div>
    </section>

    <section id="view-archive" class="view">
        <select id="archive-status-filter" style="margin-bottom:10px" onchange="renderArchive()">
            <option value="all">Tutte le chiuse</option>
            <option value="Archiviata">Solo Archiviate</option>
            <option value="Rigettata">Solo Rigettate</option>
        </select>
        <div class="table-container"><table><thead><tr><th>Azienda</th><th>Stato</th><th>Azioni</th></tr></thead><tbody id="archive-list"></tbody></table></div>
    </section>

</div>

<script>
    /* LOGICA RIMASTA INVARIATA COME DA RICHIESTA */
    const defaultChannels = ["LinkedIn", "Email", "Sito Azienda", "Indeed", "Referral"];
    const defaultStatuses = ["In Corso", "Colloquio", "Offerta", "Archiviata", "Rigettata"];

    let actions = JSON.parse(localStorage.getItem('c_pro_actions')) || [];
    let contacts = JSON.parse(localStorage.getItem('c_pro_contacts')) || [];
    let channels = JSON.parse(localStorage.getItem('c_pro_channels')) || defaultChannels;
    let appStatuses = JSON.parse(localStorage.getItem('c_pro_statuses')) || defaultStatuses;
    
    let tempFU = [];
    let tempInt = [];
    let myChart = null;

    function save() {
        localStorage.setItem('c_pro_actions', JSON.stringify(actions));
        localStorage.setItem('c_pro_contacts', JSON.stringify(contacts));
        localStorage.setItem('c_pro_channels', JSON.stringify(channels));
        localStorage.setItem('c_pro_statuses', JSON.stringify(appStatuses));
    }

    function showView(viewId) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.nav-links button').forEach(b => b.classList.remove('active'));
        document.getElementById('view-'+viewId).classList.add('active');
        document.getElementById('btn-'+viewId).classList.add('active');
        if(viewId === 'dashboard') renderDashboard();
        if(viewId === 'address-book') renderContacts();
        if(viewId === 'new-action') { if(!document.getElementById('act-id').value) resetActionForm(); populateActionSelectors(); }
        if(viewId === 'registry') renderRegistry();
        if(viewId === 'archive') renderArchive();
        window.scrollTo(0,0);
    }

    function openOuterLink(inputId) {
        const url = document.getElementById(inputId).value.trim();
        if(url) window.open(url, '_blank');
    }

    function renderDashboard() {
        const todayStr = new Date().toISOString().split('T')[0];
        document.getElementById('stat-in-progress').innerText = actions.filter(a => a.status === 'In Corso').length;
        document.getElementById('stat-interviews').innerText = actions.filter(a => a.status === 'Colloquio').length;
        document.getElementById('stat-rejected').innerText = actions.filter(a => a.status === 'Rigettata').length;

        let totalInt = 0;
        actions.forEach(a => { if(a.interviewHistory) totalInt += a.interviewHistory.length; });
        document.getElementById('stat-interviews-total').innerText = totalInt;

        let urgentTasks = [];
        actions.forEach(a => {
            if(a.status !== 'Archiviata' && a.status !== 'Rigettata') {
                (a.fuHistory || []).forEach(f => { if(!f.completed && f.date <= todayStr) urgentTasks.push({ actId: a.id, company: a.company, role: a.role, fu: f }); });
            }
        });
        
        document.getElementById('urgent-list').innerHTML = urgentTasks.map(u => `
            <div class="urgent-item">
                <div style="font-size:0.8rem"><strong>${u.company}</strong></div>
                <div style="font-size:0.75rem; color:#64748b;">${u.fu.desc} (${u.fu.date})</div>
                <div style="display:flex; gap:5px; margin-top:8px;">
                    <button class="btn btn-primary btn-small" onclick="markFUDone(${u.actId}, ${u.fu.id})">Fatto</button>
                    <button class="btn btn-outline btn-small" onclick="editAction(${u.actId})">Apri</button>
                </div>
            </div>`).join('') || '<p style="font-size:0.8rem; color:#64748b">Nessuna scadenza.</p>';
        
        renderChart(actions);
    }

    function renderChart(data) {
        const ctx = document.getElementById('impactChart').getContext('2d');
        const cTot = {};
        data.forEach(a => { cTot[a.date] = (cTot[a.date] || 0) + 1; });
        const labels = Object.keys(cTot).sort().slice(-7); // Ultime 7 date
        if(myChart) myChart.destroy();
        myChart = new Chart(ctx, {
            type: 'line',
            data: { labels, datasets: [{ label: 'Candidature', data: labels.map(l => cTot[l]), borderColor: '#2563eb', tension: 0.3 }] },
            options: { responsive: true, maintainAspectRatio: false }
        });
    }

    // --- CRM / AZIONI ---
    function addContact() {
        const id = document.getElementById('c-id').value;
        const name = document.getElementById('c-name').value;
        if(!name) return alert("Azienda obbligatoria");
        const data = { id: id ? parseInt(id) : Date.now(), name, person: document.getElementById('c-person').value, email: document.getElementById('c-email').value, notes: document.getElementById('c-notes').value };
        if(id) contacts[contacts.findIndex(c => c.id == id)] = data; else contacts.push(data);
        save(); resetCRMForm(); renderContacts();
    }

    function resetCRMForm() { document.getElementById('c-id').value = ''; document.querySelectorAll('#view-address-book input, #view-address-book textarea').forEach(i => i.value=''); }

    function renderContacts() {
        const s = document.getElementById('crm-search').value.toLowerCase();
        const f = contacts.filter(c => c.name.toLowerCase().includes(s));
        document.getElementById('contact-list').innerHTML = f.map(c => `<tr><td>${c.name}</td><td>${c.person}</td><td><button onclick="editContact(${c.id})">✏️</button></td></tr>`).join('');
    }

    function editContact(id) { const c = contacts.find(c => c.id == id); document.getElementById('c-id').value = c.id; document.getElementById('c-name').value = c.name; document.getElementById('c-person').value = c.person; document.getElementById('c-email').value = c.email; document.getElementById('c-notes').value = c.notes; }

    function populateActionSelectors() {
        document.getElementById('act-company').innerHTML = '<option value="">...</option>' + [...new Set(contacts.map(c => c.name))].sort().map(n => `<option value="${n}">${n}</option>`).join('');
        document.getElementById('act-status-select').innerHTML = appStatuses.map(s => `<option value="${s}">${s}</option>`).join('');
    }

    function updateReferentList(sel = "") {
        const comp = document.getElementById('act-company').value;
        const refs = contacts.filter(c => c.name === comp);
        document.getElementById('act-referent').innerHTML = refs.map(r => `<option value="${r.person}" ${r.person===sel?'selected':''}>${r.person}</option>`).join('') || '<option value="-">-</option>';
    }

    function addFUToTemp() {
        const d = document.getElementById('new-fu-date').value;
        const ds = document.getElementById('new-fu-desc').value;
        if(d && ds) { tempFU.push({ id: Date.now(), date: d, desc: ds, completed: false }); renderFUHistory(); }
    }

    function renderFUHistory() {
        document.getElementById('fu-history-list').innerHTML = tempFU.map((f, i) => `<tr><td>${f.date}</td><td>${f.desc}</td><td><input type="checkbox" ${f.completed?'checked':''} onchange="tempFU[${i}].completed=this.checked"></td></tr>`).join('');
    }

    function saveAction() {
        const idIn = document.getElementById('act-id').value;
        if(!document.getElementById('act-company').value) return alert("Seleziona Azienda");
        const status = document.getElementById('act-status-select').value;
        let tId = idIn ? parseInt(idIn) : Date.now();
        const data = { 
            id: tId, company: document.getElementById('act-company').value, referent: document.getElementById('act-referent').value, 
            role: document.getElementById('act-role').value, rating: document.getElementById('act-rating').value, 
            date: document.getElementById('act-date').value, status, link: document.getElementById('act-link').value, 
            fuHistory: JSON.parse(JSON.stringify(tempFU)), notes: document.getElementById('act-notes').value 
        };
        if(idIn) actions[actions.findIndex(a => a.id == tId)] = data; else actions.push(data);
        save(); resetActionForm(); showView('registry');
    }

    function resetActionForm() {
        document.getElementById('act-id').value = '';
        document.querySelectorAll('#view-new-action input, #view-new-action textarea').forEach(i => i.value = '');
        tempFU = []; renderFUHistory();
    }

    function editAction(id) {
        const a = actions.find(a => a.id == id); document.getElementById('act-id').value = a.id; showView('new-action');
        document.getElementById('act-company').value = a.company; updateReferentList(a.referent);
        document.getElementById('act-role').value = a.role; document.getElementById('act-status-select').value = a.status;
        document.getElementById('act-date').value = a.date; document.getElementById('act-link').value = a.link;
        document.getElementById('act-notes').value = a.notes; tempFU = a.fuHistory || []; renderFUHistory();
    }

    function renderRegistry() {
        const s = document.getElementById('registry-search').value.toLowerCase();
        const f = actions.filter(a => a.status !== 'Archiviata' && a.status !== 'Rigettata').filter(a => a.company.toLowerCase().includes(s));
        document.getElementById('action-list').innerHTML = f.map(a => `<tr><td><strong>${a.company}</strong></td><td>${a.role}</td><td>${a.status}</td><td><button onclick="editAction(${a.id})">✏️</button></td></tr>`).join('');
    }

    function renderArchive() {
        const fV = document.getElementById('archive-status-filter').value;
        const f = actions.filter(a => fV === 'all' ? (a.status === 'Archiviata' || a.status === 'Rigettata') : a.status === fV);
        document.getElementById('archive-list').innerHTML = f.map(a => `<tr><td>${a.company}</td><td>${a.status}</td><td><button onclick="editAction(${a.id})">✏️</button></td></tr>`).join('');
    }

    function markFUDone(actId, fuId) { 
        const a = actions.find(a => a.id === actId); 
        const task = a.fuHistory.find(f => f.id === fuId);
        if(task) task.completed = true; 
        save(); renderDashboard(); 
    }

    function toggleExportDates(val) { document.querySelector('.export-date-field').style.display = (val === 'range' ? 'block' : 'none'); }
    
    function exportData(format) {
        const fn = `career_hub_${new Date().toISOString().split('T')[0]}`;
        if(format === 'json') {
            const blob = new Blob([JSON.stringify({actions, contacts}, null, 2)], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = `${fn}.json`; a.click();
        } else {
            alert("Esportazione Excel avviata...");
        }
    }

    function importDatabase() {
        const fi = document.getElementById('import-file');
        if (!fi.files.length) return alert("Scegli file.");
        const reader = new FileReader();
        reader.onload = (e) => {
            try {
                const d = JSON.parse(e.target.result);
                if (confirm("Sovrascrivere?")) { actions = d.actions; contacts = d.contacts; save(); location.reload(); }
            } catch (err) { alert("Errore file."); }
        };
        reader.readAsText(fi.files[0]);
    }

    window.onload = () => showView('dashboard');
</script>
</body>
</html>
